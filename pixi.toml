[workspace]
authors = ["Ibrahim Ibrahimov <ibrahimkhaliloglu@gmail.com>"]
channels = ["conda-forge"]
name = "ult-to-speech-pytorch"
platforms = ["linux-64"]
version = "0.1.0"

[system-requirements]
cuda = "12.1"

[dependencies]
pytorch = ">=2.0.0"
torchvision = ">=0.15.0"
torchaudio = ">=0.15.0"
pytorch-lightning = ">=2.0.0"
pydantic = ">=2.0.0"
pyyaml = ">=6.0"
numpy = ">=1.24.0"
opencv = ">=4.7.0"
scikit-learn = ">=1.2.0"
rich = ">=15.0.0,<16"
scipy = ">=1.17.1,<2"
h5py = ">=3.16.0,<4"
librosa = ">=0.11.0,<0.12"
mlflow = ">=3.12.0,<4"

[pypi-dependencies]
soundfile = ">=0.13.1, <0.14"
huggingface_hub = ">=0.20.0"
